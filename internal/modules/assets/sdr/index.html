<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0a">
<link rel="stylesheet" href="/style.css">
<title>SDR Sweep — CZ Field Console</title>
<style>
  .badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:8px}
  .badge.run{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .badge.idle{background:#131a13;color:var(--dim);box-shadow:0 0 0 1px var(--line) inset}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .card-head h2{margin:0}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .field label{font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:3px}
  .field input[type=number]{width:100%;font-family:inherit;font-size:13px;background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
  .field.full{grid-column:1/-1}
  .check-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px}
  .controls{display:flex;gap:10px}
  .btn{flex:1;text-align:center;padding:12px;border-radius:12px;font-weight:700;letter-spacing:1px;border:none;font-family:inherit;font-size:14px;cursor:pointer}
  .btn.stop{background:#2a0d0d;color:#ff5a5a;box-shadow:0 0 0 1px #5e1919 inset}
  .btn.start{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .msg{font-size:12px;color:var(--accent2);min-height:16px;margin-top:6px}
  .msg.err{color:#ff5a5a}
</style>
</head>
<body>
  <header class="appbar">
    <a class="back" href="/" style="color:var(--dim);text-decoration:none;font-size:18px">‹</a>
    <h1>SDR SWEEP</h1>
  </header>

  <main class="wrap">

    <!-- rtl_power card -->
    <section class="card">
      <div class="card-head">
        <span id="pwr-badge" class="badge idle">IDLE</span>
        <h2>RTL_POWER SWEEP</h2>
      </div>
      <div id="pwr-form">
        <div class="grid">
          <div class="field"><label>LOW MHz</label>
            <input type="number" id="pwr-low" min="27" max="1700" value="450"></div>
          <div class="field"><label>HIGH MHz</label>
            <input type="number" id="pwr-high" min="27" max="1700" value="470"></div>
          <div class="field"><label>BIN KHz</label>
            <input type="number" id="pwr-bin" min="1" max="1000" value="5"></div>
          <div class="field"><label>CROP %</label>
            <input type="number" id="pwr-crop" min="0" max="90" value="30"></div>
          <div class="field"><label>GAIN dBm (0=AGC)</label>
            <input type="number" id="pwr-gain" min="0" max="50" value="20"></div>
          <div class="field"><label>INTEGRATION s</label>
            <input type="number" id="pwr-int" min="1" max="600" value="10"></div>
          <div class="field full"><label>DURATION s (0=single shot)</label>
            <input type="number" id="pwr-dur" min="0" max="86400" value="300"></div>
        </div>
        <div class="check-row">
          <input type="checkbox" id="pwr-hm" checked>
          <label for="pwr-hm">Generate heatmap PNG</label>
        </div>
        <div class="controls">
          <button class="btn start" id="pwr-start">START SWEEP</button>
        </div>
      </div>
      <div id="pwr-run" style="display:none">
        <div class="controls">
          <button class="btn stop" id="pwr-stop">STOP SWEEP</button>
        </div>
      </div>
      <div id="pwr-msg" class="msg"></div>
    </section>

    <!-- rtl_433 card -->
    <section class="card">
      <div class="card-head">
        <span id="r433-badge" class="badge idle">IDLE</span>
        <h2>RTL_433 SCANNER</h2>
      </div>
      <div id="r433-form">
        <div class="grid">
          <div class="field full"><label>FREQ MHz</label>
            <input type="number" id="r433-freq" min="27" max="1700" step="0.01" value="433.92"></div>
          <div class="field"><label>BANDWIDTH KHz</label>
            <input type="number" id="r433-bw" min="1" max="1000" value="250"></div>
          <div class="field"><label>GAIN dBm (0=AGC)</label>
            <input type="number" id="r433-gain" min="0" max="50" value="0"></div>
          <div class="field full"><label>DURATION s (0=continuous)</label>
            <input type="number" id="r433-dur" min="0" max="86400" value="300"></div>
        </div>
        <div class="controls">
          <button class="btn start" id="r433-start">START SCAN</button>
        </div>
      </div>
      <div id="r433-run" style="display:none">
        <div class="controls">
          <button class="btn stop" id="r433-stop">STOP SCAN</button>
        </div>
      </div>
      <div id="r433-msg" class="msg"></div>
    </section>

  </main>
  <script src="sdr.js"></script>
</body>
</html>
