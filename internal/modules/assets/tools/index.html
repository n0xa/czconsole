<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0a">
<link rel="stylesheet" href="/style.css">
<title>Tools — CZ Field Console</title>
<style>
  .tools{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .toolcard{display:block;text-decoration:none;padding:14px;border-radius:12px;background:var(--panel2);
            box-shadow:0 0 0 1px var(--line) inset;color:var(--fg)}
  .toolcard.off{opacity:.45}
  .toolcard b{font-size:15px;letter-spacing:.5px}
  .toolcard .dot{float:right;width:9px;height:9px;border-radius:50%;background:var(--line);margin-top:4px}
  .toolcard .dot.run{background:#39ff8a;box-shadow:0 0 6px #39ff8a}
  .toolcard small{display:block;color:var(--dim);margin-top:4px;font-size:11px}
  .field{margin-bottom:10px}
  .field label{font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:3px}
  .field input[type=text]{width:100%;font-family:inherit;font-size:14px;background:var(--panel2);color:var(--fg);
            border:1px solid var(--line);border-radius:8px;padding:8px 9px}
  .check-row{display:flex;align-items:center;gap:8px;margin:8px 0;font-size:13px}
  .note{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.45;
        color:var(--dim);white-space:pre-wrap;margin:6px 0 12px;overflow-x:auto}
  .controls{display:flex;gap:10px;margin-top:6px}
  .btn{flex:1;text-align:center;padding:12px;border-radius:12px;font-weight:700;letter-spacing:1px;border:none;
       font-family:inherit;font-size:14px;cursor:pointer}
  .btn.start{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .btn.stop{background:#2a0d0d;color:#ff5a5a;box-shadow:0 0 0 1px #5e1919 inset}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .msg{font-size:12px;color:var(--accent2);min-height:16px;margin-top:6px}
  .msg.err{color:#ff5a5a}
  .dim{color:var(--dim)}
  .rhead{font-size:11px;color:var(--dim);margin-bottom:6px}
  .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;line-height:1.45;
       white-space:pre-wrap;word-break:break-word;max-height:55vh;overflow:auto;margin:0}
  .dl{display:inline-block;color:#39ff8a;text-decoration:none;font-size:14px;padding:6px 0}
</style>
</head>
<body>
  <header class="appbar">
    <a class="back" id="back" href="/" style="color:var(--dim);text-decoration:none;font-size:18px">‹</a>
    <h1 id="title">TOOLS</h1>
  </header>
  <main class="wrap" id="main">—</main>
  <script src="tools.js"></script>
</body>
</html>
