<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0a">
<link rel="stylesheet" href="/style.css">
<title>Net Recon — CZ Field Console</title>
<style>
  .badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:8px}
  .badge.run{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .badge.idle{background:#131a13;color:var(--dim);box-shadow:0 0 0 1px var(--line) inset}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .card-head h2{margin:0}
  .field label{font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-bottom:3px}
  .opts{width:100%;font-family:inherit;font-size:14px;background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:9px}
  .check-row{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:13px}
  .hint{font-size:11px;color:var(--dim);line-height:1.6;margin:4px 0 12px}
  .hint code{color:var(--accent2)}
  .controls{display:flex;gap:10px}
  .btn{flex:1;text-align:center;padding:12px;border-radius:12px;font-weight:700;letter-spacing:1px;border:none;font-family:inherit;font-size:14px;cursor:pointer}
  .btn.stop{background:#2a0d0d;color:#ff5a5a;box-shadow:0 0 0 1px #5e1919 inset}
  .btn.start{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .msg{font-size:12px;color:var(--accent2);min-height:16px;margin-top:6px}
  .msg.err{color:#ff5a5a}
  .res-meta{font-size:12px;color:var(--dim);margin-bottom:10px;word-break:break-all}
  .res-meta .opts{all:unset;color:var(--fg);font-weight:700}
  table.res{width:100%;border-collapse:collapse;font-size:13px}
  table.res td{padding:3px 6px;border-bottom:1px solid var(--line)}
  table.res td.open{color:#39ff8a}
  table.res td.filtered{color:var(--dim)}
  table.res td.addr{color:#39ff8a;font-weight:700}
  .res-sum{font-weight:700;margin-bottom:8px}
</style>
</head>
<body>
  <header class="appbar">
    <a class="back" href="/" style="color:var(--dim);text-decoration:none;font-size:18px">‹</a>
    <h1>NET RECON</h1>
    <span id="badge" class="badge idle">IDLE</span>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="card-head"><h2>NMAP SCAN</h2></div>
      <div id="form">
        <div class="field">
          <label>OPTIONS</label>
          <input class="opts" id="opts" placeholder="-sS -p 1-1000 10.0.0.0/24"
                 autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <div class="check-row">
          <input type="checkbox" id="logerr">
          <label for="logerr">Log stderr to a .err file</label>
        </div>
        <div class="hint">
          <code>-sS</code>/<code>-sT</code>/<code>-sA</code> SYN/Connect/ACK ·
          <code>-sn</code> ping sweep ·
          <code>-Pn</code> <code>-O</code> <code>-p 1-1000,22</code> ·
          target <code>IP</code> / <code>CIDR</code>
        </div>
        <div class="controls"><button class="btn start" id="start">START SCAN</button></div>
      </div>
      <div id="run" style="display:none">
        <div class="res-meta">scanning <span class="opts" id="run-subject"></span></div>
        <div class="controls"><button class="btn stop" id="stop">STOP SCAN</button></div>
      </div>
      <div id="msg" class="msg"></div>
    </section>

    <section class="card" id="results" style="display:none">
      <div class="card-head"><h2>LATEST RESULTS</h2></div>
      <div class="res-meta">
        <span class="opts" id="res-opts"></span><br>
        <span id="res-when"></span>
      </div>
      <div id="res-body"></div>
    </section>
  </main>

  <script src="netrecon.js"></script>
</body>
</html>
