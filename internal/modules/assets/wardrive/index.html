<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0a">
<link rel="stylesheet" href="/style.css">
<title>Wardrive — CZ Field Console</title>
<style>
  .statusrow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .badge{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:8px}
  .badge.run{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  .badge.idle{background:#131a13;color:var(--dim);box-shadow:0 0 0 1px var(--line) inset}
  .timer{color:var(--dim);font-size:12px;margin-left:auto}
  .counts{display:flex;gap:8px}
  .count{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 4px}
  .count .n{font-size:28px;line-height:1;color:#eafff2;font-weight:700}
  .count .l{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:5px}
  .count.delta .n{color:var(--accent)}
  .controls{display:flex;gap:10px;align-items:center;margin-top:2px}
  .btn{flex:1;text-align:center;padding:13px;border-radius:12px;font-weight:700;letter-spacing:1px;border:none;font-family:inherit;font-size:14px;cursor:pointer}
  .btn.stop{background:#2a0d0d;color:#ff5a5a;box-shadow:0 0 0 1px #5e1919 inset}
  .btn.start{background:#0b3018;color:#39ff8a;box-shadow:0 0 0 1px #195e33 inset}
  select{font-family:inherit;font-size:13px;background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:10px;padding:9px}
  .feed{display:grid;gap:1px}
  .ssid{display:flex;align-items:center;gap:8px;padding:7px 2px;border-bottom:1px dotted var(--line)}
  .ssid .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ssid .nm.hidden{color:var(--dim);font-style:italic}
  .ssid .lock{font-size:11px;color:var(--lock)}
  .ssid .lock.open{color:var(--warn)}
  .ssid .rssi{font-size:11px;color:var(--dim);width:42px;text-align:right}
  .export{display:flex;gap:10px}
  .export .btn{background:var(--panel2);color:var(--fg);box-shadow:0 0 0 1px var(--line) inset;font-weight:600;font-size:13px}
  .msg{font-size:12px;color:var(--accent2);min-height:16px}
  .msg.err{color:#ff5a5a}
</style>
</head>
<body>
  <header class="appbar">
    <a class="back" href="/" style="color:var(--dim);text-decoration:none;font-size:18px">‹</a>
    <h1>WARDRIVE</h1>
    <span id="gps" class="pill">GPS —</span>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="statusrow">
        <span id="badge" class="badge idle">IDLE</span>
        <span id="timer" class="timer"></span>
      </div>
      <div class="counts">
        <div class="count"><div class="n" id="c-aps">—</div><div class="l">APs</div></div>
        <div class="count"><div class="n" id="c-cli">—</div><div class="l">CLIENTS</div></div>
        <div class="count delta"><div class="n" id="c-new">—</div><div class="l">NEW/MIN</div></div>
      </div>
    </section>

    <section class="card">
      <div id="idle-controls" class="controls">
        <select id="iface"></select>
        <button class="btn start" id="start">START</button>
      </div>
      <div id="run-controls" class="controls" style="display:none">
        <button class="btn stop" id="stop">STOP</button>
        <span class="pill" id="iface-tag"></span>
      </div>
      <div id="msg" class="msg"></div>
    </section>

    <section class="card" id="feed-card" style="display:none">
      <h2>Live feed</h2>
      <div id="feed" class="feed"></div>
    </section>

    <section class="card export" id="export-card" style="display:none">
      <a class="btn" href="api/export?fmt=wigle">⬇ WiGLE CSV</a>
      <a class="btn" href="api/export?fmt=kml">⬇ KML</a>
    </section>
  </main>

  <script src="wardrive.js"></script>
</body>
</html>
