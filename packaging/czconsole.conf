# czconsole web-worker options (read by czconsole.service as an EnvironmentFile).
# Edit, then: systemctl restart czconsole.service
#
# Secure-by-default: a login is required out of the box. To fall back to the
# LAN-trusted MVP behaviour (no auth — only sane on a private hotspot), blank
# this out or drop --require-login.
#
# Useful additions:
#   --secure-cookie        only send the session cookie over TLS
#   --session-ttl-min 240  shorten session lifetime (default 720 = 12h)
CZCONSOLE_OPTS=--require-login --auth-sock /run/czconsole/auth.sock
