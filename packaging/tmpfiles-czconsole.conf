# /run/czconsole holds the privsep sockets (files.sock, auth.sock). Three users
# meet here — the worker (_czconsole, owner), the files agent (kali), and the
# auth agent (root) — so it can't be a single unit's RuntimeDirectory (whichever
# started last would re-chown it, and a restart would delete the peer's socket).
# A tmpfiles entry creates it once, owned by the worker, group-writable to the
# czconsole group, sticky so members can't delete each other's sockets.
d /run/czconsole 1770 _czconsole czconsole -
